<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>用户信息</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../css/public.css" media="all">
    <style>
        .detail-card {
            margin-bottom: 15px;
        }

        .detail-card .layui-card-header {
            background-color: #f8f8f8;
            border-bottom: 1px solid #e6e6e6;
            font-weight: bold;
            color: #333;
        }

        .detail-card .layui-card-body {
            padding: 20px;
        }

        .info-row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            width: 120px;
            color: #666;
            font-weight: 500;
            flex-shrink: 0;
        }

        .info-value {
            flex: 1;
            color: #333;
        }

        .layui-form-switch {
            margin-top: 0;
            margin-bottom: 0;
        }
    </style>
</head>

<body>

    <div class="layuimini-container">
        <div class="layuimini-main">
            <form class="layui-form" lay-filter="userform">
                <input type="hidden" name="userid" id="userid">
                <div class="layui-row layui-col-space15">
                    <div class="layui-col-md12">
                        <div class="layui-card detail-card">
                            <div class="layui-card-header">基本信息</div>
                            <div class="layui-card-body">
                                <div class="layui-row layui-col-space15">
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label required">用户ID</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-username"></i>
                                                    </div>
                                                    <input type="text" name="userid" id="userid_input"
                                                        class="layui-input" lay-verify="required" maxlength="25" placeholder="请输入用户ID" pattern="[0-9a-zA-Z]+" oninput="this.value = this.value.replace(/[^0-9a-zA-Z]/g, '')">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label required">用户名称</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-user"></i>
                                                    </div>
                                                    <input type="text" name="username" class="layui-input"
                                                        lay-verify="required" maxlength="25" placeholder="请输入用户名称">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label required">行政区划</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-location"></i>
                                                    </div>
                                                    <select name="xzqh" id="xzqh" lay-verify="required"
                                                        lay-filter="xzqh" placeholder="请选择行政区划">
                                                        <option value="">请选择</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label required">部门名称</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-group"></i>
                                                    </div>
                                                    <input type="text" name="bmmc" class="layui-input"
                                                        lay-verify="required" maxlength="50" placeholder="请输入部门名称">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label">身份证号码</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-vercode"></i>
                                                    </div>
                                                    <input type="text" name="sfz" class="layui-input"
                                                        lay-verify="identity" maxlength="18" placeholder="请输入身份证号码">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label">手机号码</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-cellphone"></i>
                                                    </div>
                                                    <input type="text" name="smsphone" class="layui-input"
                                                        lay-verify="phone" placeholder="请输入手机号码">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="layui-card detail-card">
                            <div class="layui-card-header">权限设置</div>
                            <div class="layui-card-body">
                                <div class="layui-row layui-col-space15">
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label required">权限行政区划</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-location"></i>
                                                    </div>
                                                    <select name="xzbm" id="xzbm" lay-verify="required" placeholder="请选择权限行政区划">
                                                        <option value="">请选择</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label required">用户类型</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-cols"></i>
                                                    </div>
                                                    <select name="superadmin" id="superadmin">
                                                        <option value="0">普通用户</option>
                                                        <option value="1">管理员用户</option>
                                                        <option value="2">访客用户</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="layui-card detail-card">
                            <div class="layui-card-header">账号状态</div>
                            <div class="layui-card-body">
                                <div class="layui-row layui-col-space15">
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label">账号冻结</div>
                                            <div class="info-value">
                                                <input type="checkbox" name="freeze" lay-skin="switch"
                                                    lay-text="已冻结|正常">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label">密码过期日期</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-date"></i>
                                                    </div>
                                                    <input type="text" name="passwordexpired" id="passwordexpired"
                                                        class="layui-input" placeholder="yyyy-MM-dd">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label">账号有效期限</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-date"></i>
                                                    </div>
                                                    <input type="text" name="expire" id="expire" class="layui-input"
                                                        placeholder="yyyy-MM-dd">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="layui-form-item" style="text-align: center; margin-top: 20px;">
                            <div class="layui-input-block">
                                <button type="submit" class="layui-btn" lay-submit lay-filter="formDemo"
                                    id="submitBtn">提交</button>
                                <button type="button" class="layui-btn layui-btn-primary" id="closeBtn">关闭</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../lib/layui/layui.js" charset="utf-8"></script>
    <script src="../lib/jquery-3.4.1/jquery-3.4.1.min.js" charset="utf-8"></script>
    <script src="../lib/blueimp-md5/md5.min.js" charset="utf-8"></script>
    <script>
        var pageType = '';

        function child(dataFromFather) {
            ///console.log(dataFromFather);
            var form = layui.form;
            var userid = dataFromFather.userid || '';
            pageType = dataFromFather.type || '';

            $('#userid').val(userid);

            if (pageType === 'detail') {
                setFormDisabled(true);
            } else {
                setFormDisabled(false);
            }

            loadComboBoxData(function () {
                if (userid) {
                    loadFormData(userid);
                } else if (dataFromFather.bmbm) {
                    var formData = {
                        'xzqh': dataFromFather.bmbm,
                        'xzbm': dataFromFather.bmbm
                    };

                    if (pageType === 'insert') {
                        var today = new Date();
                        var todayStr = today.getFullYear() + '-' +
                            String(today.getMonth() + 1).padStart(2, '0') + '-' +
                            String(today.getDate()).padStart(2, '0');

                        var expireDate = new Date();
                        expireDate.setFullYear(expireDate.getFullYear() + 5);
                        var expireStr = expireDate.getFullYear() + '-' +
                            String(expireDate.getMonth() + 1).padStart(2, '0') + '-' +
                            String(expireDate.getDate()).padStart(2, '0');

                        formData['passwordexpired'] = todayStr;
                        formData['expire'] = expireStr;
                    }

                    form.val('userform', formData);
                    form.render();
                }
            });
        }

        function loadComboBoxData(callback) {
            var form = layui.form;
            var login_data = layui.data('login_data');
            var xzbm = login_data.xzbm || '';

            $.ajax({
                url: '../../api/gaorg',
                type: 'get',
                data: { xzbm: xzbm },
                dataType: "json",
                success: function (result) {
                    if (result.code === 0) {
                        $('#xzqh').empty();
                        $('#xzqh').append('<option value="">请选择</option>');

                        $.each(result.data, function (index, value) {
                            $('#xzqh').append(new Option(value.xzmc, value.xzbm));
                        });
                    }

                    form.render('select');

                    $.ajax({
                        url: '../../api/gaorg_qx',
                        type: 'get',
                        dataType: "json",
                        success: function (result) {
                            if (result.code === 0) {
                                $('#xzbm').empty();
                                $('#xzbm').append('<option value="">请选择</option>');

                                $.each(result.data, function (index, value) {
                                    $('#xzbm').append(new Option(value.xzmc, value.xzbm));
                                });
                            }

                            form.render('select');

                            if (callback) {
                                callback();
                            }
                        },
                        error: function () {
                            layer.msg('权限行政区划数据加载失败', { icon: 2 });
                            if (callback) {
                                callback();
                            }
                        }
                    });
                },
                error: function () {
                    layer.msg('行政区划数据加载失败', { icon: 2 });
                    if (callback) {
                        callback();
                    }
                }
            });
        }

        function loadFormData(userid) {
            var form = layui.form;

            $.ajax({
                url: '../../api/getusetdata',
                type: 'get',
                data: {
                    userid: userid
                },
                dataType: "json",
                success: function (result) {
                    ///console.log(result);
                    if (result.code === 0 && result.data.length === 1) {
                        var data = result.data[0];

                        form.val('userform', {
                            "userid": data.userid || '',
                            "username": data.username || '',
                            "sfz": data.sfz || '',
                            "xzqh": data.xzqh || '',
                            "bmmc": data.bmmc || '',
                            "superadmin": data.superadmin || '0',
                            "smsphone": data.smsphone || '',
                            "passwordexpired": data.passwordexpired || '',
                            "freeze": data.freeze == 1,
                            "expire": data.expire || '',
                            "xzbm": data.xzbm || ''
                        });

                        form.render();
                    } else {
                        layer.msg('未获取到数据', { icon: 2 });
                    }
                },
                error: function () {
                    layer.msg('数据加载失败', { icon: 2 });
                }
            });
        }

        function setFormDisabled(disabled) {
            var form = layui.form;

            if (disabled) {
                $('#userid_input').attr('disabled', true);
                $('input[name="username"]').attr('disabled', true);
                $('input[name="sfz"]').attr('disabled', true);
                $('#xzqh').attr('disabled', true);
                $('input[name="bmmc"]').attr('disabled', true);
                $('#xzbm').attr('disabled', true);
                $('input[name="smsphone"]').attr('disabled', true);
                $('#passwordexpired').attr('disabled', true);
                $('#expire').attr('disabled', true);

                $('#submitBtn').hide();
                $('#closeBtn').show();

                $('select[name="superadmin"]').attr('disabled', true);
                $('input[name="freeze"]').prop('disabled', true);
            } else {
                if (pageType === 'update') {
                    $('#userid_input').attr('disabled', true);
                } else {
                    $('#userid_input').removeAttr('disabled');
                }
                $('input[name="username"]').removeAttr('disabled');
                $('input[name="sfz"]').removeAttr('disabled');
                $('#xzqh').removeAttr('disabled');
                $('input[name="bmmc"]').removeAttr('disabled');
                $('#xzbm').removeAttr('disabled');
                $('input[name="smsphone"]').removeAttr('disabled');
                $('#passwordexpired').attr('disabled', true);
                $('#expire').removeAttr('disabled');

                $('#submitBtn').show();
                $('#closeBtn').show();

                $('select[name="superadmin"]').removeAttr('disabled');
            }

            form.render();
        }

        layui.use(['form', 'layer', 'laydate'], function () {
            var form = layui.form;
            var layer = layui.layer;
            var laydate = layui.laydate;

            laydate.render({
                elem: '#passwordexpired',
                type: 'date',
                format: 'yyyy-MM-dd'
            });

            laydate.render({
                elem: '#expire',
                type: 'date',
                format: 'yyyy-MM-dd'
            });

            form.on('select(xzqh)', function (data) {
                var selectedValue = data.value;
                var xzbmSelect = $('#xzbm');
                var options = xzbmSelect.find('option');
                var found = false;

                options.each(function () {
                    var optionValue = $(this).val();
                    if (optionValue === selectedValue && selectedValue !== '') {
                        xzbmSelect.val(selectedValue);
                        found = true;
                        return false;
                    }
                });

                if (!found) {
                    xzbmSelect.val('');
                }

                form.render('select');
            });

            $('#closeBtn').on('click', function () {
                var iframeIndex = parent.layer.getFrameIndex(window.name);
                parent.layer.close(iframeIndex);
            });

            form.on('submit(formDemo)', function (data) {
                var formData = data.field;

                ///formData.superadmin = formData.superadmin === 'on' ? 1 : 0;
                formData.freeze = formData.freeze === 'on' ? 1 : 0;

                var edittype = pageType || 'insert';
                formData['edittype'] = edittype;

                if (edittype != 'insert' && edittype != 'update') {
                    layer.msg('操作类型错误', { icon: 2 });
                    return false;
                }

                ///console.log(formData);

                $.post('../../api/edituserdata', JSON.stringify(formData), function (res) {
                    if (res.code === 0) {
                        if (edittype === 'insert') {
                            var newpassword = res.newpassword || '';
                            layer.open({
                                title: '用户创建成功',
                                type: 1,
                                area: ['400px', '300px'],
                                shadeClose: false,
                                content: '<div style="padding: 20px;">' +
                                    '<div style="margin-bottom: 15px; font-size: 16px; font-weight: bold;">用户创建成功，请记住你的账号密码！</div>' +
                                    '<div style="margin-bottom: 10px;">登录账号：<span style="color: #0066cc; font-weight: bold;">' + formData.userid + '</span></div>' +
                                    '<div style="margin-bottom: 10px;">临时密码：<span style="color: #ff6600; font-weight: bold; font-size: 18px;">' + newpassword + '</span> <button id="copyPasswordBtn" style="margin-left: 10px; padding: 2px 8px; background-color: #009688; color: white; border: none; border-radius: 3px; cursor: pointer;">复制</button></div>' +
                                    '<div style="margin-top: 15px; color: #999; font-size: 14px;">用户将在下次登录时需要修改密码</div>' +
                                    '</div>',
                                btn: ['确定'],
                                yes: function (index) {
                                    layer.close(index);
                                    parent.layui.$(window.parent.document).trigger('table_reload', 'shuaxin');
                                    var iframeIndex = parent.layer.getFrameIndex(window.name);
                                    parent.layer.close(iframeIndex);
                                },
                                success: function(layero) {
                                    layero.find('#copyPasswordBtn').on('click', function() {
                                        var tempInput = document.createElement('input');
                                        tempInput.value = newpassword;
                                        document.body.appendChild(tempInput);
                                        tempInput.select();
                                        document.execCommand('copy');
                                        document.body.removeChild(tempInput);
                                        layer.msg('密码已复制到剪贴板', {icon: 1, time: 1000});
                                    });
                                }
                            });
                        } else {
                            layer.msg(res.msg, { icon: 1, time: 1200 }, function () {
                                parent.layui.$(window.parent.document).trigger('table_reload', 'shuaxin');
                                var iframeIndex = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(iframeIndex);
                            });
                        }
                    } else {
                        layer.msg(res.msg, { icon: 2 });
                    }
                }, 'json')

                return false;
            });
        });
    </script>
</body>

</html>
