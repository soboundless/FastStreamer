<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>社会面飞手信息详情</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../css/public.css" media="all">
</head>

<body>

    <div class="layuimini-container">
        <div class="layuimini-main">
            <form class="layui-form" lay-filter="searchform">
                <fieldset class="layui-elem-field layui-field-title">
                    <legend style="color: #9c9c9c;">基本信息</legend>
                </fieldset>
                <div class="layui-form-item">

                    <div class="layui-inline">
                        <label class="layui-form-label required">飞手姓名</label>
                        <div class="layui-col-xs7">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-username"></i>
                                </div>
                                <input type="text" name="holdername" value="" lay-verify="required" placeholder="填写飞手姓名"
                                    lay-reqtext="请填写飞手姓名" autocomplete="off" class="layui-input" id="holderno" maxlength="25">
                            </div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label required">身份证号码</label>
                        <div class="layui-col-xs7">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-vercode"></i>
                                </div>
                                <input type="text" name="holderno" value="" lay-verify="required|identity" maxlength="20"
                                    placeholder="填写身份证号码" lay-reqtext="请填写身份证号码" autocomplete="off" class="layui-input"
                                    id="holderno" style="width: 250px;" pattern="[0-9xX]+" oninput="this.value = this.value.replace(/[^0-9xX]/g, '')">
                            </div>
                        </div>
                    </div>

                    <div class="layui-inline">
                        <label class="layui-form-label required">人员类别</label>
                        <div class="layui-input-inline">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-cols"></i>
                                </div>
                                <select name="leibieno" id="leibieno" lay-verify="required" lay-verify="">
                                    <option value="">请选择</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label required">行政区划</label>
                    <div class="layui-input-inline">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-transfer"></i>
                            </div>
                            <select name="xzqh" id="xzqh" lay-verify="required">
                                <option value="">请选择归属行政区划</option>
                            </select>
                        </div>
                    </div>
                    <label class="layui-form-label">单位名称</label>
                    <div class="layui-input-inline" style="width: 300px;">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-group"></i>
                            </div>
                            <input type="text" name="bumen" class="layui-input" placeholder="请输入单位名称" maxlength="100">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label required">手机号码</label>
                    <div class="layui-col-xs7">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-cellphone"></i>
                            </div>
                            <input type="text" name="phone" value="" lay-verify="required|phone" placeholder="请输入手机号"
                                lay-reqtext="请填写手机号" autocomplete="off" class="layui-input" id="reg-cellphone" maxlength="20">
                        </div>
                    </div>
                </div>


                <div class="layui-form-item">
                    <label class="layui-form-label required">户籍地址</label>
                    <div class="layui-col-xs7">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-note"></i>
                            </div>
                            <input type="text" name="huji" class="layui-input" placeholder="请输入户籍地址" lay-verify="required" maxlength="100">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">居住地址</label>
                    <div class="layui-col-xs7">
                        <div class="layui-input-wrap">
                            <div class="layui-input-prefix">
                                <i class="layui-icon layui-icon-home"></i>
                            </div>
                            <input type="text" name="zhuzhi" class="layui-input" placeholder="请输入居住地址" maxlength="250">
                        </div>
                    </div>
                </div>
                <fieldset class="layui-elem-field layui-field-title">
                    <legend style="color: #9c9c9c;">资质信息</legend>
                </fieldset>
                <div class="layui-form-item">
                    <div class="layui-inline">
                        <label class="layui-form-label required">资质证书</label>
                        <div class="layui-input-inline">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-form"></i>
                                </div>
                                <select name="zizhino" id="zizhino" lay-verify="required">
                                    <option value="">请选择资质证书</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="layui-inline">
                        <label class="layui-form-label required">取得时间</label>
                        <div class="layui-input-inline">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-date"></i>
                                </div>
                                <input name="zizhitime" value="" id="zizhitime" autocomplete="off" class="layui-input"
                                    type="text" lay-verify="required" placeholder="选择资质取得时间">
                            </div>
                        </div>
                    </div>
                    <div class="layui-form-item">
                        <label class="layui-form-label">UOM登记</label>
                        <div class="layui-input-inline" style="width: 500px;">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-website"></i>
                                </div>
                                <input type="text" name="uom" class="layui-input" maxlength="50">
                            </div>
                        </div>
                    </div>
                </div>
                <fieldset class="layui-elem-field layui-field-title">
                    <legend style="color: #9c9c9c;">风险评估</legend>
                </fieldset>
                <div class="layui-form-item">
                    <div class="layui-col-xs4">
                        <label class="layui-form-label">前科情况</label>
                        <div class="layui-col-xs8">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-form"></i>
                                </div>
                                <input type="text" name="qianke" class="layui-input" placeholder="请输入前科情况" maxlength="250">
                            </div>
                        </div>
                    </div>
                    <div class="layui-col-xs4">
                        <label class="layui-form-label required">是否涉稳</label>
                        <div class="layui-input-inline">
                            <input type="checkbox" name="isshewen" lay-skin="switch" lay-text="涉稳人员|非涉稳人员" lay-verify="required">
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <div class="layui-col-xs7">
                        <label class="layui-form-label">"黑飞"地点</label>
                        <div class="layui-input-inline" style="width: 500px;">
                            <div class="layui-input-wrap">
                                <div class="layui-input-prefix">
                                    <i class="layui-icon layui-icon-location"></i>
                                </div>
                                <input type="text" name="hfdz" class="layui-input" placeholder="请输入黑飞地点(若有)" maxlength="250">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="layui-form-item">
                    <label class="layui-form-label">"黑飞"历史</label>
                    <div class="layui-col-xs7">
                        <textarea name="hfls" class="layui-textarea" placeholder="请输入黑飞历史信息(若有)" maxlength="2500"></textarea>
                    </div>
                </div>

                <fieldset class="layui-elem-field layui-field-title">
                    <legend style="color: #9c9c9c;">其他信息</legend>
                </fieldset>
                <div class="layui-form-item">
                    <label class="layui-form-label">备注</label>
                    <div class="layui-col-xs7">
                        <textarea name="beizhu" class="layui-textarea" placeholder="请输入其他相关信息" maxlength="250"></textarea>
                    </div>
                </div>


                <div class="layui-form-item">
                    <div class="layui-input-block">
                        <button class="layui-btn layui-btn-normal layui-btn-radius" id="commit" lay-submit
                            lay-filter="formDemo"><i class="layui-icon layui-icon-success"></i> 立即提交</button>
                        <button class="layui-btn layui-btn-danger layui-btn-radius" id="closeBtn"><i
                                class="layui-icon layui-icon-error"></i> 关闭编辑</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../lib/layui/layui.js" charset="utf-8"></script>
    <script src="../lib/jquery-3.4.1/jquery-3.4.1.min.js" charset="utf-8"></script>
    <script>
        var currentEditType = '';

        function child(dataFromFather) {
            ///console.log(dataFromFather);
            var form = layui.form;
            currentEditType = dataFromFather.type;
            var datano = dataFromFather.datano;

            $.when(
                $.ajax({
                    url: '../../../api/gaorg',
                    type: 'get',
                    dataType: "json"
                }),
                $.ajax({
                    url: '../../../api/uav_zizhi',
                    type: 'get',
                    dataType: "json"
                }),
                $.ajax({
                    url: '../../../api/sh_leibie',
                    type: 'get',
                    dataType: "json"
                })
            ).done(function (result1, result2, result3) {
                if (result1[0].code === 0) {
                    $('#xzqh').empty();
                    $.each(result1[0].data, function (index, value) {
                        $('#xzqh').append(new Option(value.xzmc, value.xzbm));
                    });
                }

                if (result2[0].code === 0) {
                    $('#zizhino').empty();
                    $.each(result2[0].data, function (index, value) {
                        $('#zizhino').append(new Option(value.zizhiname, value.zizhino));
                    });
                }

                if (result3[0].code === 0) {
                    $('#leibieno').empty();
                    $.each(result3[0].data, function (index, value) {
                        $('#leibieno').append(new Option(value.leibiename, value.leibieno));
                    });
                }

                form.render('select');

                if (currentEditType === 'update' && datano > 0) {
                    $.ajax({
                        url: '../../api/shfeishou',
                        type: 'get',
                        data: {
                            datano: datano
                        },
                        dataType: "json",
                        success: function (result) {
                            ///console.log(result);
                            if (result.code === 0 && result.data.length === 1) {
                                var data = result.data[0];
                                form.val('searchform', {
                                    "holdername": data.holdername,
                                    "holderno": data.holderno,
                                    "xzqh": data.xzqh,
                                    "phone": data.phone,
                                    "huji": data.huji,
                                    "zhuzhi": data.zhuzhi,
                                    "bumen": data.bumen,
                                    "zizhino": data.zizhino,
                                    "zizhitime": data.zizhitime,
                                    "leibieno": data.leibieno,
                                    "qianke": data.qianke,
                                    "hfls": data.hfls,
                                    "hfdz": data.hfdz,
                                    "uom": data.uom,
                                    "beizhu": data.beizhu
                                });

                                $('input[name="isshewen"]').prop('checked', data.isshewen === '是');
                                form.render('checkbox');
                                form.render('select');
                                $('input[name="datano"]').remove();
                                $('<input type="hidden" name="datano" value="' + datano + '">').insertBefore('#commit');
                            } else {
                                layer.msg('未获取到数据', { icon: 2 }, function () {
                                    var iframeIndex = parent.layer.getFrameIndex(window.name);
                                    parent.layer.close(iframeIndex);
                                });
                            }
                        },
                        error: function () {
                            layer.msg('数据加载失败', { icon: 2 }, function () {
                                var iframeIndex = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(iframeIndex);
                            });
                        }
                    });
                }
            }).fail(function () {
                layer.msg('基础数据加载失败', { icon: 2 }, function () {
                    var iframeIndex = parent.layer.getFrameIndex(window.name);
                    parent.layer.close(iframeIndex);
                });
            });
        }

        layui.use(['form', 'layer'], function () {
            var form = layui.form;
            var layer = layui.layer;
            var laydate = layui.laydate;
            laydate.render({
                elem: '#zizhitime'
                , type: 'date'
                , value: '2015-01-01'
            });
            form.on('submit(formDemo)', function (data) {
                dataJson = form.val("searchform");
                ///console.log(dataJson);
                var datano = dataJson.datano || 0;
                dataJson['edittype'] = currentEditType;
                dataJson['datano'] = datano;
                dataJson['isshewen'] = dataJson.isshewen === 'on' ? '是' : '否';
                if (currentEditType !== 'insert' && currentEditType !== 'update') {
                    layer.msg('操作类型错误', function () { });
                    return false;
                }

                $.ajax({
                    url: '../../api/editshfeishou',
                    type: 'post',
                    contentType: 'application/json',
                    data: JSON.stringify(dataJson),
                    dataType: 'json',
                    success: function (res) {
                        if (res.code === 0) {
                            layer.msg(res.msg, { icon: 1, time: 1200 }, function () {
                                parent.layui.$(window.parent.document).trigger('table_reload', 'shuaxin');
                                var iframeIndex = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(iframeIndex);
                            })
                        } else {
                            layer.msg(res.msg, { icon: 2 }, function () { });
                        }
                    },
                    error: function () {
                        layer.msg('提交失败', { icon: 2 });
                    }
                })
                return false;
            });
            $('#closeBtn').on('click', function () {
                var iframeIndex = parent.layer.getFrameIndex(window.name);
                parent.layer.close(iframeIndex);
                return false;
            });
        });
    </script>
</body>

</html>
