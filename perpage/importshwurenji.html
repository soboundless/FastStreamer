<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>批量导入社会无人机</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1,
            maximum-scale=1">
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../css/public.css" media="all">
    <!-- <link rel="stylesheet" href="../lib/font-awesome-4.7.0/css/font-awesome.min.css" media="all"> -->
    <script src="../js/xlsx.full.min.js"></script>
    <script src="../js/mymodule.js"></script>
</head>

<body>
    <div class="layuimini-container">
        <div class="layuimini-main">
            <fieldset class="table-search-fieldset">
                <legend>批量导入社会无人机操作（本地文件修改后，需重新选择文件页面才会生效）</legend>
                <div style="margin: 10px 10px 10px 10px">
                    <div class="layui-form">
                        <div class="layui-form-item">
                            <div class="layui-input-inline" style="width: calc(100% - 120px);">
                                <input type="text" id="fileName" placeholder="请选择导入文件" readonly class="layui-input">
                            </div>
                            <div class="layui-input-inline" style="width: 100px;">
                                <button type="button" class="layui-btn layui-btn-primary layui-border-blue"
                                    id="selectFile">
                                    <i class="layui-icon layui-icon-folder-open"></i>
                                    <!-- 选择文件按钮 -->
                                </button>
                            </div>
                            <input type="file" id="fileInput" accept=".xlsx,.jpg,.jpeg,.png,.gif,.bmp" multiple style="display: none;" title="请将要上传的图片一起选择">
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block" style="margin-left: 0;">
                                <a href="javascript:;" id="downloadTemplate"
                                    style="color: #2c5f7d; text-decoration: underline;">下载文件模版</a>
                            </div>
                        </div>
                        <div class="layui-form-item">
                            <div class="layui-input-block" style="margin-left: 0;">
                                <span style="color: #999; font-size: 12px;">1、支持导入总记录数一万条以内，xlsx格式的Excel格式文件,点击数据校验通过后才能上传数据；</span><br>
                                <span style="color: #af3b0d; font-size: 12px;">2、如果需要批量上传图片，请在选择EXCEL文件时,将要上传的图片一起批量选择,并确保图片文件名与表格中对应字段的文件名一致；</span><br>
                                <span style="color: #999; font-size: 12px;">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(可以将EXCEL表格和图片放置同一文件夹,选择文件时使用Ctrl+A进行全选,图片大小限制3M以内)</span><br>
                                <span style="color: #999; font-size: 12px;">3、请不要改变表格模版的排版，否则可能会造成数据错乱。</span>
                            </div>
                        </div>
                    </div>
                </div>
            </fieldset>

            <div style="margin: 0 10px 10px 10px;">
                <hr style="border: none; border-top: 1px solid #e6e6e6;">
            </div>

            <div style="margin: 10px 10px 10px 10px;">
                <div class="layui-form">
                    <div class="layui-form-item">
                        <div class="layui-input-block" style="margin-left: 0;">
                            <button type="button" class="layui-btn layui-btn-disabled" id="validateBtn" disabled>
                                <i class="layui-icon layui-icon-ok-circle"></i> 数据校验
                            </button>
                            <button type="button" class="layui-btn layui-btn-disabled" id="importBtn" disabled>
                                <i class="layui-icon layui-icon-upload-drag"></i> 数据导入
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <fieldset class="table-search-fieldset">
                <legend>操作结果</legend>
                <div style="margin: 10px 10px 10px 10px">
                    <div id="resultArea"
                        style="min-height: 200px; max-height: 500px; overflow-y: auto; background: #f5f5f5; padding: 15px; border-radius: 4px;">
                        <p style="color: #999;">请选择文件并进行数据校验...</p>
                    </div>
                </div>
            </fieldset>
        </div>
    </div>

    <script src="../lib/layui/layui.js" charset="utf-8"></script>
    <script src="../lib/jquery-3.4.1/jquery-3.4.1.min.js" charset="utf-8"></script>
    <script>
        layui.use(['layer', 'form'], function () {
            var layer = layui.layer,
                form = layui.form;

            var templateUrl = 'http://68.232.35.97:8088/tabletemplate/社会无人机导入模版.xlsx';
            var jsonData = [];
            var validatedData = [];
            var selectedFiles = {};

            $('#downloadTemplate').on('click', function () {
                window.open(templateUrl, '_blank');
            });

            $('#selectFile').on('click', function () {
                $('#fileInput').click();
            });

            $('#fileInput').on('change', function (e) {
                jsonData = [];
                validatedData = [];
                selectedFiles = {}; // 重置选中的文件
                $('#resultArea').html('<p style="color: #999;">请选择文件并进行数据校验...</p>');
                $('#validateBtn').addClass('layui-btn-disabled').prop('disabled', true);
                $('#importBtn').addClass('layui-btn-disabled').prop('disabled', true);

                var files = e.target.files;
                if (!files || files.length === 0) {
                    return;
                }

                var excelFile = null;
                var imageFiles = {};
                var excelFileCount = 0;
                var excelFileName = '';
                var imageCount = 0;

                // 遍历选择的文件
                for (var i = 0; i < files.length; i++) {
                    var file = files[i];
                    var fileName = file.name;
                    var fileExt = fileName.substring(fileName.lastIndexOf('.')).toLowerCase();

                    // 存储文件到selectedFiles对象
                    selectedFiles[fileName] = file;

                    // 判断文件类型
                    if (fileExt === '.xlsx') {
                        excelFile = file;
                        excelFileName = fileName;
                        excelFileCount++;
                    } else {
                        imageFiles[fileName] = file;
                        // 检查是否为图片文件
                        var validImgExts = ['.jpg', '.jpeg', '.png', '.gif', '.bmp'];
                        if (validImgExts.includes(fileExt)) {
                            imageCount++;
                        }
                    }
                }

                if (excelFileCount === 0) {
                    layer.msg('请选择Excel文件', { icon: 2 });
                    $('#fileName').val('');
                    return;
                }

                if (excelFileCount > 1) {
                    layer.msg('只能选择一个Excel文件', { icon: 2 });
                    $('#fileName').val('');
                    return;
                }

                // 构建显示文本
                var displayText = '';
                if (excelFileName) {
                    displayText = excelFileName;
                    if (imageCount > 0) {
                        displayText += '+图片文件' + imageCount + '个';
                    }
                }
                
                $('#fileName').val(displayText);

                // 解析Excel文件
                var reader = new FileReader();
                reader.onload = function (e) {
                    var data = new Uint8Array(e.target.result);
                    var workbook = XLSX.read(data, { type: 'array' });

                    var firstSheetName = workbook.SheetNames[0];
                    var worksheet = workbook.Sheets[firstSheetName];

                    jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                    var dataRowCount = jsonData.length - 2;
                    console.log('总行数：', jsonData.length);
                    console.log('数据行数（减去前两行）：', dataRowCount);
                    console.log('选择的文件：', selectedFiles);

                    if (dataRowCount <= 0) {
                        layer.msg('记录行数为0', { icon: 2 });
                        var resultHtml = '<p style="color: #FF5722;">记录行数为0</p>';
                        $('#resultArea').html(resultHtml);
                        $('#validateBtn').addClass('layui-btn-disabled').prop('disabled', true);
                        $('#importBtn').addClass('layui-btn-disabled').prop('disabled', true);
                        return;
                    }

                    // 构建文件信息显示
                    var fileInfo = '';
                    if (excelFileName) {
                        fileInfo = excelFileName;
                        if (imageCount > 0) {
                            fileInfo += '+图片文件' + imageCount + '个';
                        }
                    }
                    
                    var resultHtml = '<p style="color: #2c5f7d; font-weight: bold;">文件解析成功，共 ' + jsonData.length + ' 行数据</p>';
                    resultHtml += '<p style="color: #666; margin-bottom: 10px;">数据行数：' + dataRowCount + ' 行</p>';
                    resultHtml += '<p style="color: #666;">请点击[数据校验]按钮进行数据校验</p>';
                    if (fileInfo) {
                        resultHtml += '<p style="color: #666; font-size: 12px;">选择的文件：' + fileInfo + '</p>';
                    }

                    $('#resultArea').html(resultHtml);
                    layer.msg('文件解析成功', { icon: 1 });
                    $('#validateBtn').removeClass('layui-btn-disabled').prop('disabled', false);
                    $('#importBtn').addClass('layui-btn-disabled').prop('disabled', true);
                    $('#fileInput').val('');
                };

                reader.readAsArrayBuffer(excelFile);
            });

            // 验证函数已移至js/mymodule.js文件中，其他页面也可使用

            $('#validateBtn').on('click', async function () {
                if (jsonData.length === 0) {
                    layer.msg('请先选择文件', { icon: 2 });
                    return;
                }

                if (jsonData.length > 10000) {
                    layer.msg('导入总记录数不能超过一万条', { icon: 2 });
                    return;
                }

                // 禁用校验按钮，防止重复点击
                $(this).addClass('layui-btn-disabled').prop('disabled', true);

                // 准备校验参数
                var files = [];
                for (var fileName in selectedFiles) {
                    files.push(selectedFiles[fileName]);
                }

                // 字段配置
                var fieldConfig = [
                    { name: 'datano', label: '记录流水号', limit: 0, length: [0, 0] },
                    { name: 'xzqh', label: '区域代码', limit: 0, length: [4, 20] },
                    { name: 'bgdw', label: '保管情况', limit: 0, length: [1, 100] },
                    { name: 'holderno', label: '证件号码', limit: 2, length: [18, 18] },
                    { name: 'phone', label: '联系方式', limit: 0, length: [11, 11] },
                    { name: 'wrjsn', label: '无人机序号', limit: 2, length: [1, 50] },
                    { name: 'wrjppno', label: '无人机品牌', limit: 1, length: [1, 3] },
                    { name: 'wrjxh', label: '无人机型号', limit: 0, length: [2, 25] },
                    { name: 'wrjzlno', label: '无人机质量', limit: 1, length: [1, 3] },
                    { name: 'gztime', label: '购置时间', limit: 3, length: [0, 0] },
                    { name: 'gztj', label: '购置途径', limit: 0, length: [0, 10] },
                    { name: 'gzdz', label: '购置地点', limit: 0, length: [0, 50] },
                    { name: 'ytno', label: '使用目的', limit: 1, length: [1, 3] },
                    { name: 'xhsj', label: '飞行时长', limit: 1, length: [1, 5] },
                    { name: 'isbx', label: '是否购买保险', limit: 5, length: [1, 1] },
                    { name: 'bxqx', label: '保险期限', limit: 3, length: [0, 0] },
                    { name: 'ispj', label: '是否破解限高', limit: 5, length: [1, 1] },
                    { name: 'gzhqk', label: '改装情况', limit: 0, length: [0, 250] },
                    { name: 'gzqk', label: '挂载情况', limit: 0, length: [0, 250] },
                    { name: 'beizhi', label: '备注', limit: 0, length: [0, 250] },
                    { name: 'imgurl', label: '图片名称', limit: 4, length: [0, 100] }
                ];
                // - 0：无限制
                // - 1：限制为数字
                // - 2：限制为英文大小写加数字
                // - 3：限制为日期格式yyyy-mm-dd
                // - 4：图片列
                // - 5：逻辑列，只能填'是'或'否'
                // 每一列的最小长度和每一列的最大长度,0表示不限制
                // 日志显示的页面ID
                var logPageId = 'resultArea';

                // 在线校验的接口地址
                var validateApi = '../../api/editshwurenji';

                // 调用通用校验函数
                try {
                    var result = await validateExcelData(files, fieldConfig, logPageId, validateApi);

                    if (result) {
                        // 校验成功，保存校验结果
                        validatedData = result;
                        // 启用导入按钮
                        $('#importBtn').removeClass('layui-btn-disabled').prop('disabled', false);
                    }
                } catch (error) {
                    layer.msg('校验过程中发生错误，请重试', { icon: 2 });
                    console.error('校验错误:', error);
                } finally {
                    // 启用校验按钮
                    $(this).removeClass('layui-btn-disabled').prop('disabled', false);
                }
            });

            $('#importBtn').on('click', function () {
                if (validatedData.length === 0) {
                    layer.msg('请先进行数据校验', { icon: 2 });
                    return;
                }

                layer.confirm('确认要导入 ' + validatedData.length + ' 条数据吗？', { icon: 3, title: '提示' }, function (index) {
                    layer.close(index);
                    
                    // 准备上传参数
                    var records = validatedData;
                    var uploadApi = '../../api/editshwurenji';
                    var imageUploadApi = '../../api/upLoadFileData';
                    var logPageId = 'resultArea';

                    // 禁用导入按钮，防止重复点击
                    $('#importBtn').addClass('layui-btn-disabled').prop('disabled', true);
                    $('#validateBtn').addClass('layui-btn-disabled').prop('disabled', true);

                    // 调用通用上传函数
                    uploadExcelData(records, uploadApi, imageUploadApi, logPageId);
                });
            });
        });
    </script>
</body>

</html>
