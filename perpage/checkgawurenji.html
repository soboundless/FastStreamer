<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <title>公安内部无人机信息</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../css/public.css" media="all">
    <style>
        .detail-card {
            margin-bottom: 15px;
        }

        .detail-card .layui-card-header {
            background-color: #f8f8f8;
            border-bottom: 1px solid #e6e6e6;
            font-weight: bold;
            color: #333;
        }

        .detail-card .layui-card-body {
            padding: 20px;
        }

        .info-row {
            display: flex;
            margin-bottom: 15px;
            align-items: center;
        }

        .info-row:last-child {
            margin-bottom: 0;
        }

        .info-label {
            width: 100px;
            color: #666;
            font-weight: 500;
            flex-shrink: 0;
        }

        .info-value {
            flex: 1;
            color: #333;
        }

        .img-container {
            text-align: center;
            padding: 20px;
            background-color: #f9f9f9;
            border: 1px solid #e6e6e6;
            border-radius: 4px;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container img {
            max-width: 100%;
            max-height: 280px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
        }

        .no-image {
            color: #999;
            font-size: 14px;
        }

        .upload-btn {
            margin-top: 15px;
            margin-left: auto;
            margin-right: auto;
            display: block;
            width: 150px;
        }
    </style>
</head>

<body>

    <div class="layuimini-container">
        <div class="layuimini-main">
            <form class="layui-form" lay-filter="checkform">
                <input type="hidden" name="datano" id="datano">
                <input type="hidden" name="imgurl" id="imgurl">
                <div class="layui-row layui-col-space15">
                    <div class="layui-col-md8">
                        <div class="layui-card detail-card">
                            <div class="layui-card-header">基本信息</div>
                            <div class="layui-card-body">
                                <div class="info-row">
                                    <div class="info-label required">无人机品牌</div>
                                    <div class="info-value">
                                        <div class="layui-input-wrap">
                                            <div class="layui-input-prefix">
                                                <i class="layui-icon layui-icon-cols"></i>
                                            </div>
                                            <select name="wrjppno" id="wrjppno" lay-search lay-verify="required">
                                                <option value="">请选择</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label required">无人机型号</div>
                                    <div class="info-value">
                                        <div class="layui-input-wrap">
                                            <div class="layui-input-prefix">
                                                <i class="layui-icon layui-icon-form"></i>
                                            </div>
                                            <input type="text" name="wrjxh" class="layui-input" maxlength="25" lay-verify="required" placeholder="请输入无人机型号">
                                        </div>
                                    </div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label required">无人机序号</div>
                                    <div class="info-value">
                                        <div class="layui-input-wrap">
                                            <div class="layui-input-prefix">
                                                <i class="layui-icon layui-icon-vercode"></i>
                                            </div>
                                            <input type="text" name="wrjsn" class="layui-input" lay-verify="required" maxlength="50"
                                                placeholder="请输入无人机序号" pattern="[0-9a-zA-Z]+" oninput="this.value = this.value.replace(/[^0-9a-zA-Z]/g, '')">
                                        </div>
                                    </div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label required">行政区划</div>
                                    <div class="info-value">
                                        <div class="layui-input-wrap">
                                            <div class="layui-input-prefix">
                                                <i class="layui-icon layui-icon-transfer"></i>
                                            </div>
                                            <select name="xzqh" id="xzqh" lay-verify="required">
                                                <option value="">请选择</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label required">保管单位</div>
                                    <div class="info-value">
                                        <div class="layui-input-wrap">
                                            <div class="layui-input-prefix">
                                                <i class="layui-icon layui-icon-group"></i>
                                            </div>
                                            <input type="text" name="bgdw" class="layui-input" lay-verify="required" maxlength="100" placeholder="请输入保管单位">
                                        </div>
                                    </div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label required">责任人</div>
                                    <div class="info-value">
                                        <div class="layui-input-wrap">
                                            <div class="layui-input-prefix">
                                                <i class="layui-icon layui-icon-username"></i>
                                            </div>
                                            <input type="text" name="zrr" class="layui-input" lay-verify="required" maxlength="25" placeholder="请输入责任人">
                                        </div>
                                    </div>
                                </div>
                                <div class="info-row">
                                    <div class="info-label required">联系电话</div>
                                    <div class="info-value">
                                        <div class="layui-input-wrap">
                                            <div class="layui-input-prefix">
                                                <i class="layui-icon layui-icon-cellphone"></i>
                                            </div>
                                            <input type="text" name="phone" class="layui-input" lay-verify="required|phone" maxlength="20"
                                                placeholder="请输入联系电话">
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="layui-card detail-card">
                            <div class="layui-card-header">技术参数</div>
                            <div class="layui-card-body">
                                <div class="layui-row layui-col-space15">
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label required">无人机质量</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-engine"></i>
                                                    </div>
                                                    <select name="wrjzlno" id="wrjzlno" lay-verify="required">
                                                        <option value="">请选择无人机质量</option>
                                                    </select>
                                                </div>
                                            </div>
                                        </div>
                                        <div class="info-row">
                                            <div class="info-label">购置时间</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-date"></i>
                                                    </div>
                                                    <input type="text" name="gztime" id="gztime" class="layui-input"
                                                        placeholder="yyyy-MM-dd" lay-verify="date">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="info-row">
                                            <div class="info-label">续航时间</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-time"></i>
                                                    </div>
                                                    <input type="number" name="xhsj" class="layui-input" max="999"
                                                        lay-verify="required|number"
                                                        oninput="if(this.value>999)this.value=999"
                                                        placeholder="请输入续航时间">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="layui-col-md6">
                                        <div class="info-row">
                                            <div class="info-label">是否购买保险</div>
                                            <div class="info-value">
                                                <input type="checkbox" name="isbx" lay-skin="switch" lay-text="已购买|未购买">
                                            </div>
                                        </div>
                                        <div class="info-row">
                                            <div class="info-label">保险期限</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-date"></i>
                                                    </div>
                                                    <input type="text" name="bxqx" id="bxqx" class="layui-input"
                                                        placeholder="yyyy-MM-dd" lay-verify="date">
                                                </div>
                                            </div>
                                        </div>
                                        <div class="info-row">
                                            <div class="info-label">挂载情况</div>
                                            <div class="info-value">
                                                <div class="layui-input-wrap">
                                                    <div class="layui-input-prefix">
                                                        <i class="layui-icon layui-icon-survey"></i>
                                                    </div>
                                                    <input type="text" name="gzqk" class="layui-input" maxlength="250"
                                                        placeholder="请输入挂载情况">
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="layui-card detail-card">
                            <div class="layui-card-header">其他信息</div>
                            <div class="layui-card-body">
                                <div class="info-row" style="align-items: flex-start;">
                                    <div class="info-label">备注</div>
                                    <div class="info-value">
                                        <textarea name="beizhi" class="layui-textarea" style="min-height: 100px;" maxlength="250"
                                            placeholder="请输入备注"></textarea>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="layui-col-md4">
                        <div class="layui-card detail-card">
                            <div class="layui-card-header">无人机图片</div>
                            <div class="layui-card-body">
                                <div class="img-container">
                                    <img id="uavImage" src="" alt="无人机图片" style="display: none;">
                                    <div id="noImage" class="no-image">暂无图片</div>
                                </div>
                                <button type="button" class="layui-btn layui-btn-normal upload-btn" id="uploadBtn">
                                    <i class="layui-icon layui-icon-upload"></i> 上传图片
                                </button>
                                <input type="file" id="fileInput" accept="image/*" style="display: none;">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="layui-form-item" style="margin-top: 20px;">
                    <div class="layui-input-block" style="text-align: center;">
                        <button type="submit" class="layui-btn" lay-submit lay-filter="saveBtn" id="saveBtn">
                            <i class="layui-icon layui-icon-ok"></i> 立即提交
                        </button>
                        <button type="button" class="layui-btn layui-btn-primary" id="closeBtn">
                            <i class="layui-icon layui-icon-close"></i> 关闭
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script src="../lib/layui/layui.js" charset="utf-8"></script>
    <script src="../lib/jquery-3.4.1/jquery-3.4.1.min.js" charset="utf-8"></script>
    <script>
        var pageType = '';
        var isUploading = false;

        function child(dataFromFather) {
            ///console.log(dataFromFather);
            var form = layui.form;
            var datano = dataFromFather.datano || 0;
            pageType = dataFromFather.type || '';

            $('#datano').val(datano);

            if (pageType === 'detail') {
                setFormDisabled(true);
            } else {
                setFormDisabled(false);
            }

            loadComboBoxData(function () {
                if (datano > 0) {
                    loadFormData(datano);
                }
            });
        }

        function loadComboBoxData(callback) {
            var form = layui.form;

            // 并发请求所有API
            $.when(
                $.ajax({
                    url: '../../api/uav_wrjpp',
                    type: 'get',
                    dataType: "json"
                }),
                $.ajax({
                    url: '../../api/uav_wrjzl',
                    type: 'get',
                    dataType: "json"
                }),
                $.ajax({
                    url: '../../api/gaorg',
                    type: 'get',
                    dataType: "json"
                })
            ).done(function(result1, result2, result3) {
                // 处理第一个API结果 - 无人机品牌
                if (result1[0].code === 0) {
                    $('#wrjppno').empty();
                    $('#wrjppno').append('<option value="">请选择无人机品牌</option>');
                    $.each(result1[0].data, function (index, value) {
                        $('#wrjppno').append(new Option(value.ppname, value.ppno));
                    });
                }

                // 处理第二个API结果 - 无人机质量
                if (result2[0].code === 0) {
                    $('#wrjzlno').empty();
                    $('#wrjzlno').append('<option value="">请选择无人机质量</option>');
                    $.each(result2[0].data, function (index, value) {
                        $('#wrjzlno').append(new Option(value.wrjzlname, value.wrjzlno));
                    });
                }

                // 处理第三个API结果 - 行政区划
                if (result3[0].code === 0) {
                    $('#xzqh').empty();
                    $('#xzqh').append('<option value="">请选择归属行政区划</option>');
                    $.each(result3[0].data, function (index, value) {
                        $('#xzqh').append(new Option(value.xzmc, value.xzbm));
                    });
                }

                form.render('select');

                if (datano > 0) {
                    loadFormData(datano);
                } else if (pageType !== 'detail') {
                    // 在insert模式时设置xhsj的默认值为30
                    $('input[name="xhsj"]').val(30);
                }

                if (callback) {
                    callback();
                }
            }).fail(function() {
                layer.msg('基础数据加载失败', { icon: 2 });
            });
        }

        function loadFormData(datano) {
            var form = layui.form;

            $.ajax({
                url: '../../api/gawurenji',
                type: 'get',
                data: {
                    datano: datano
                },
                dataType: "json",
                success: function (result) {
                    ///console.log(result);
                    if (result.code === 0 && result.data.length === 1) {
                        var data = result.data[0];
                        form.val('checkform', {
                            "datano": data.datano || '',
                            "xzqh": data.xzqh || '',
                            "bgdw": data.bgdw || '',
                            "zrr": data.zrr || '',
                            "phone": data.phone || '',
                            "wrjsn": data.wrjsn || '',
                            "wrjppno": data.wrjppno || '',
                            "wrjxh": data.wrjxh || '',
                            "wrjzlno": data.wrjzlno || '',
                            "gztime": data.gztime || '',
                            "xhsj": data.xhsj || '',
                            "bxqx": data.bxqx || '',
                            "gzqk": data.gzqk || '',
                            "beizhi": data.beizhi || ''
                        });

                        $('#imgurl').val(data.imgurl || '');

                        $('input[name="isbx"]').prop('checked', data.isbx === '是');
                        form.render('checkbox');

                        if (data.imgurl && data.imgurl.trim() !== '') {
                            $('#uavImage').attr('src', data.imgurl).show();
                            $('#noImage').hide();
                        } else {
                            $('#uavImage').hide();
                            $('#noImage').show();
                        }

                        if (pageType === 'detail') {
                            setFormDisabled(true);
                        }
                    } else {
                        layer.msg('未获取到数据', { icon: 2 }, function () {
                            var iframeIndex = parent.layer.getFrameIndex(window.name);
                            parent.layer.close(iframeIndex);
                        });
                    }
                },
                error: function () {
                    layer.msg('数据加载失败', { icon: 2 }, function () {
                        var iframeIndex = parent.layer.getFrameIndex(window.name);
                        parent.layer.close(iframeIndex);
                    });
                }
            });
        }

        function setFormDisabled(disabled) {
            $('form input').prop('disabled', disabled);
            $('form select').prop('disabled', disabled);
            $('form textarea').prop('disabled', disabled);

            if (disabled) {
                $('#uploadBtn').hide();
                $('#saveBtn').hide();
            } else {
                $('#uploadBtn').show();
                $('#saveBtn').show();
            }

            layui.form.render();
        }

        layui.use(['form', 'layer', 'laydate', 'upload'], function () {
            var form = layui.form;
            var layer = layui.layer;
            var laydate = layui.laydate;
            var upload = layui.upload;

            laydate.render({
                elem: '#gztime',
                type: 'date',
                format: 'yyyy-MM-dd'
            });

            laydate.render({
                elem: '#bxqx',
                type: 'date',
                format: 'yyyy-MM-dd'
            });

            $('#uploadBtn').on('click', function () {
                $('#fileInput').click();
            });

            $('#uavImage').on('click', function () {
                var imgSrc = $(this).attr('src');
                if (imgSrc && imgSrc.trim() !== '') {
                    layer.photos({
                        photos: {
                            data: [{
                                src: imgSrc
                            }]
                        },
                        anim: 5
                    });
                }
            });

            $('#fileInput').on('change', function () {
                var file = this.files[0];
                if (!file) {
                    return;
                }

                var maxSize = 3 * 1024 * 1024;
                if (file.size > maxSize) {
                    layer.msg('图片大小不能超过3M', { icon: 2 });
                    $('#fileInput').val('');
                    return;
                }

                var formData = new FormData();
                formData.append('file', file);

                isUploading = true;
                $('#saveBtn').addClass('layui-btn-disabled').attr('disabled', true);
                var loadIndex = layer.load(2);

                $.ajax({
                    url: '../../api/upLoadFileData',
                    type: 'post',
                    data: formData,
                    processData: false,
                    contentType: false,
                    success: function (result) {
                        layer.close(loadIndex);
                        //////console.log(result);
                        //////console.log(result.code);
                        if (result.code == 0) {
                            $('#imgurl').val(result.url);
                            $('#uavImage').attr('src', result.url).show();
                            $('#noImage').hide();
                            layer.msg('上传成功,但仍需点击提交按钮保存才会更新', { icon: 1 });
                        } else {
                            layer.msg(result.msg || '上传失败', { icon: 2 });
                        }
                    },
                    error: function () {
                        layer.close(loadIndex);
                        layer.msg('错误,上传失败', { icon: 2 });
                    },
                    complete: function () {
                        isUploading = false;
                        $('#saveBtn').removeClass('layui-btn-disabled').attr('disabled', false);
                    }
                });

                $('#fileInput').val('');
            });

            form.on('submit(saveBtn)', function (data) {
                if (isUploading) {
                    layer.msg('图片上传中，请稍候...', { icon: 0 });
                    return false;
                }
                var dataJson = form.val("checkform");

                var isbxChecked = $('input[name="isbx"]').prop('checked');
                dataJson.isbx = isbxChecked ? '是' : '否';

                var datano = $('#datano').val();
                if (datano > 0) {
                    dataJson.edittype = 'update';
                } else {
                    dataJson.edittype = 'insert';
                }
                var loadIndex = layer.load(2);

                $.ajax({
                    url: '../../api/editgawurenji',
                    type: 'post',
                    data: JSON.stringify(dataJson),
                    contentType: 'application/json',
                    dataType: 'json',
                    success: function (result) {
                        layer.close(loadIndex);
                        //////console.log(result);
                        if (result.code === 0) {
                            layer.msg(result.msg || '保存成功', { icon: 1, time: 1200 }, function () {
                                parent.layui.$(window.parent.document).trigger('table_reload', 'shuaxin');
                                var iframeIndex = parent.layer.getFrameIndex(window.name);
                                parent.layer.close(iframeIndex);
                            });
                        } else {
                            layer.msg(result.msg || '保存失败', { icon: 2 });
                        }
                    },
                    error: function () {
                        layer.close(loadIndex);
                        layer.msg('保存失败', { icon: 2 });
                    }
                });

                return false;
            });

            $('#closeBtn').on('click', function () {
                var iframeIndex = parent.layer.getFrameIndex(window.name);
                parent.layer.close(iframeIndex);
                return false;
            });
        });
    </script>
</body>

</html>
