<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>FastStreamer - 问题反馈</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="icon" href="../logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../lib/font-awesome/css/font-awesome.min.css" media="all">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            width: 1200px;
            margin: 40px auto;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            border: 1px solid #e8f1f7;
        }
        
        .content {
            padding: 40px;
        }
        
        .title {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .title h2 {
            color: #2c5f7d;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .title p {
            color: #888;
            font-size: 15px;
        }
        
        /* 表单样式 */
        .form-section {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .layui-form-item {
            margin-bottom: 20px;
            clear: both;
        }
        
        .layui-form-label {
            color: #555;
            font-size: 14px;
            width: 120px !important;
            white-space: nowrap;
        }
        
        .layui-input-block {
            margin-left: 150px !important;
            min-height: 38px;
        }
        
        .layui-input, .layui-textarea, .layui-select {
            border-radius: 6px !important;
        }
        
        .layui-input:focus, .layui-textarea:focus {
            border-color: #2c5f7d !important;
        }
        
        /* 按钮样式 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .layui-btn {
            padding: 0 35px;
            height: 44px;
            line-height: 44px;
            font-size: 15px;
            border-radius: 6px;
        }
        
        .layui-btn-primary {
            background-color: #2c5f7d !important;
            color: #fff !important;
        }
        
        .layui-btn-primary:hover {
            background-color: #3a7ca5 !important;
        }
        
        .layui-btn-normal {
            background-color: #fff !important;
            border: 1px solid #2c5f7d !important;
            color: #2c5f7d !important;
        }
        
        .layui-btn-normal:hover {
            background-color: #f0f7fb !important;
        }
        
        /* 页脚 */
        .footer {
            background-color: #f5f7fa;
            border-top: 1px solid #e8f1f7;
            padding: 20px 0;
            text-align: center;
            margin-top: 40px;
        }
        
        .footer-content {
            width: 1200px;
            margin: 0 auto;
        }
        
        .footer p {
            margin: 0;
            font-size: 13px;
            color: #888;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .container,
            .footer-content {
                width: 90%;
            }
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .layui-form-label {
                width: 100% !important;
                text-align: left;
            }
            
            .layui-input-block {
                margin-left: 0 !important;
                margin-top: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <div class="title">
                <h2><i class="fa fa-comments" style="color: #2c5f7d; margin-right: 10px;"></i>问题反馈</h2>
                <p>如有任何问题或建议，欢迎联系我们</p>
            </div>
            
            <div class="form-section">
                <form class="layui-form" id="feedback-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label">问题类型</label>
                        <div class="layui-input-block">
                            <select name="problem-type" id="problem-type" lay-verify="required">
                                <option value="">请选择问题类型</option>
                                <option value="功能问题">功能问题</option>
                                <option value="使用问题">使用问题</option>
                                <option value="授权问题">授权问题</option>
                                <option value="其他问题">其他问题</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">联系方式</label>
                        <div class="layui-input-block">
                            <input type="text" name="contact" id="contact" 
                                   lay-verify="required" 
                                   placeholder="请输入QQ或邮箱" 
                                   class="layui-input">
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">问题描述</label>
                        <div class="layui-input-block">
                            <textarea name="description" id="description" 
                                      lay-verify="required" 
                                      placeholder="请详细描述您遇到的问题" 
                                      class="layui-textarea" 
                                      style="min-height: 120px;"></textarea>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">软件版本</label>
                        <div class="layui-input-block">
                            <input type="text" name="version" id="version" 
                                   placeholder="请输入软件版本号" 
                                   class="layui-input">
                        </div>
                    </div>
                    
                    <div class="btn-group">
                        <button type="reset" class="layui-btn layui-btn-normal">
                            <i class="fa fa-refresh" style="margin-right: 6px;"></i>重置
                        </button>
                        <button type="submit" class="layui-btn layui-btn-primary" lay-submit lay-filter="feedback-submit">
                            <i class="fa fa-paper-plane" style="margin-right: 6px;"></i>提交反馈
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>



    <script src="../lib/layui/layui.js" charset="utf-8"></script>
    <script>
        layui.use(['form', 'layer'], function() {
            var form = layui.form;
            var layer = layui.layer;
            
            // 表单提交
            form.on('submit(feedback-submit)', function(data) {
                var problemType = document.getElementById('problem-type').value;
                var contact = document.getElementById('contact').value;
                var description = document.getElementById('description').value;
                var version = document.getElementById('version').value;
                
                // 表单验证
                if (!problemType) {
                    layer.msg('请选择问题类型', {icon: 2});
                    return false;
                }
                
                if (!contact) {
                    layer.msg('请输入联系方式', {icon: 2});
                    return false;
                }
                
                if (!description) {
                    layer.msg('请描述问题', {icon: 2});
                    return false;
                }
                
                var formData = new FormData();
                formData.append('access_key', '9d85a573-3e92-4457-8fae-361bcd460fd5');
                formData.append('problem_type', problemType);
                formData.append('contact', contact);
                formData.append('description', description);
                formData.append('version', version);
                formData.append('subject', 'FastStreamer 问题反馈');
                
                layer.msg('反馈提交中，请稍候...', {icon: 16, time: 0});
                
                fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    layer.closeAll();
                    if (data.success) {
                        layer.msg('反馈提交成功！我们会尽快处理', {icon: 1, time: 2000}, function() {
                            document.getElementById('feedback-form').reset();
                        });
                    } else {
                        layer.msg('提交失败，请重试', {icon: 2});
                    }
                })
                .catch(error => {
                    layer.closeAll();
                    layer.msg('网络错误，请稍后重试', {icon: 2});
                });
                
                return false;
            });
        });
    </script>
</body>

</html>
