<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>FastStreamer - 软件定制</title>
    <meta name="renderer" content="webkit">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <link rel="icon" href="../logo.ico" type="image/x-icon">
    <link rel="stylesheet" href="../lib/layui/css/layui.css" media="all">
    <link rel="stylesheet" href="../lib/font-awesome/css/font-awesome.min.css" media="all">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f5f7fa;
            min-height: 100vh;
            color: #333;
        }
        
        .container {
            width: 1200px;
            margin: 40px auto;
            background-color: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            border: 1px solid #e8f1f7;
        }
        
        .content {
            padding: 40px;
        }
        
        .title {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .title h2 {
            color: #2c5f7d;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .title p {
            color: #888;
            font-size: 15px;
        }
        
        /* 服务介绍 */
        .service-intro {
            background: linear-gradient(135deg, #f8fbfd 0%, #e8f1f7 100%);
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 40px;
            border: 1px solid #d0e3f0;
        }
        
        .service-intro h3 {
            color: #2c5f7d;
            font-size: 20px;
            margin-bottom: 15px;
        }
        
        .service-intro ul {
            list-style: none;
            margin-left: 0;
        }
        
        .service-intro li {
            color: #666;
            margin-bottom: 8px;
            padding-left: 25px;
            position: relative;
        }
        
        .service-intro li:before {
            content: '•';
            color: #2c5f7d;
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        
        /* 表单样式 */
        .form-section {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .layui-form-item {
            margin-bottom: 20px;
            clear: both;
        }
        
        .layui-form-label {
            color: #555;
            font-size: 14px;
            width: 120px !important;
            white-space: nowrap;
        }
        
        .layui-input-block {
            margin-left: 150px !important;
            min-height: 38px;
        }
        
        .layui-input, .layui-textarea, .layui-select {
            border-radius: 6px !important;
        }
        
        .layui-input:focus, .layui-textarea:focus {
            border-color: #2c5f7d !important;
        }
        
        /* 按钮样式 */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        
        .layui-btn {
            padding: 0 35px;
            height: 44px;
            line-height: 44px;
            font-size: 15px;
            border-radius: 6px;
        }
        
        .layui-btn-primary {
            background-color: #2c5f7d !important;
            color: #fff !important;
        }
        
        .layui-btn-primary:hover {
            background-color: #3a7ca5 !important;
        }
        
        .layui-btn-normal {
            background-color: #fff !important;
            border: 1px solid #2c5f7d !important;
            color: #2c5f7d !important;
        }
        
        .layui-btn-normal:hover {
            background-color: #f0f7fb !important;
        }
        
        /* 页脚 */
        .footer {
            background-color: #f5f7fa;
            border-top: 1px solid #e8f1f7;
            padding: 20px 0;
            text-align: center;
            margin-top: 40px;
        }
        
        .footer-content {
            width: 1200px;
            margin: 0 auto;
        }
        
        .footer p {
            margin: 0;
            font-size: 13px;
            color: #888;
        }
        
        /* 响应式 */
        @media (max-width: 1200px) {
            .container,
            .footer-content {
                width: 90%;
            }
        }
        
        @media (max-width: 768px) {
            .content {
                padding: 20px;
            }
            
            .layui-form-label {
                width: 100% !important;
                text-align: left;
            }
            
            .layui-input-block {
                margin-left: 0 !important;
                margin-top: 5px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="content">
            <div class="title">
                <h2><i class="fa fa-cogs" style="color: #2c5f7d; margin-right: 10px;"></i>软件定制</h2>
                <p>根据您的需求，提供个性化的软件定制服务</p>
            </div>
            
            <div class="service-intro">
                <h3>定制服务内容</h3>
                <ul>
                    <li>功能定制：根据具体需求开发专属功能</li>
                    <li>界面定制：根据企业品牌风格定制软件界面</li>
                    <li>协议扩展：支持特殊流媒体协议的定制开发</li>
                    <li>集成对接：与现有系统或设备的集成对接</li>
                    <li>技术支持：提供专业的技术支持和维护服务</li>
                </ul>
            </div>
            
            <div class="form-section">
                <form class="layui-form" id="customization-form">
                    <div class="layui-form-item">
                        <label class="layui-form-label">定制类型</label>
                        <div class="layui-input-block">
                            <select name="custom-type" id="custom-type" lay-verify="required">
                                <option value="">请选择定制类型</option>
                                <option value="功能定制">功能定制</option>
                                <option value="界面定制">界面定制</option>
                                <option value="协议扩展">协议扩展</option>
                                <option value="集成对接">集成对接</option>
                                <option value="其他定制">其他定制</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">联系方式</label>
                        <div class="layui-input-block">
                            <input type="text" name="contact" id="contact" 
                                   lay-verify="required" 
                                   placeholder="请输入QQ或邮箱" 
                                   class="layui-input">
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">定制需求</label>
                        <div class="layui-input-block">
                            <textarea name="requirements" id="requirements" 
                                      lay-verify="required" 
                                      placeholder="请详细描述您的定制需求" 
                                      class="layui-textarea" 
                                      style="min-height: 120px;"></textarea>
                        </div>
                    </div>
                    
                    <div class="layui-form-item">
                        <label class="layui-form-label">预算范围</label>
                        <div class="layui-input-block">
                            <input type="text" name="budget" id="budget" 
                                   placeholder="请输入预算范围（可选）" 
                                   class="layui-input">
                        </div>
                    </div>
                    
                    <div class="btn-group">
                        <button type="reset" class="layui-btn layui-btn-normal">
                            <i class="fa fa-refresh" style="margin-right: 6px;"></i>重置
                        </button>
                        <button type="submit" class="layui-btn layui-btn-primary" lay-submit lay-filter="customization-submit">
                            <i class="fa fa-paper-plane" style="margin-right: 6px;"></i>提交定制需求
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>



    <script src="../lib/layui/layui.js" charset="utf-8"></script>
    <script>
        layui.use(['form', 'layer'], function() {
            var form = layui.form;
            var layer = layui.layer;
            
            // 表单提交
            form.on('submit(customization-submit)', function(data) {
                var customType = document.getElementById('custom-type').value;
                var contact = document.getElementById('contact').value;
                var requirements = document.getElementById('requirements').value;
                var budget = document.getElementById('budget').value;
                
                // 表单验证
                if (!customType) {
                    layer.msg('请选择定制类型', {icon: 2});
                    return false;
                }
                
                if (!contact) {
                    layer.msg('请输入联系方式', {icon: 2});
                    return false;
                }
                
                if (!requirements) {
                    layer.msg('请描述定制需求', {icon: 2});
                    return false;
                }
                
                var formData = new FormData();
                formData.append('access_key', '9d85a573-3e92-4457-8fae-361bcd460fd5');
                formData.append('custom_type', customType);
                formData.append('contact', contact);
                formData.append('requirements', requirements);
                formData.append('budget', budget);
                formData.append('subject', 'FastStreamer 软件定制需求');
                
                layer.msg('需求提交中，请稍候...', {icon: 16, time: 0});
                
                fetch('https://api.web3forms.com/submit', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    layer.closeAll();
                    if (data.success) {
                        layer.msg('需求提交成功！我们会尽快与您联系', {icon: 1, time: 2000}, function() {
                            document.getElementById('customization-form').reset();
                        });
                    } else {
                        layer.msg('提交失败，请重试', {icon: 2});
                    }
                })
                .catch(error => {
                    layer.closeAll();
                    layer.msg('网络错误，请稍后重试', {icon: 2});
                });
                
                return false;
            });
        });
    </script>
</body>

</html>
